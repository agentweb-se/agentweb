name: agentweb

services:
  api:
    container_name: agentweb-api
    build:
      context: ./api
      dockerfile: ../docker/Dockerfile
    ports:
      - "4001:4001"
    volumes:
      - ./output:/app/output
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - OUTPUT_DIR=/app/output

  web:
    container_name: agentweb-web
    build:
      context: ./web
      dockerfile: ../docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://api:4001
    depends_on:
      - api
